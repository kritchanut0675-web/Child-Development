<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Play Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="p-4">
    <header class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-indigo-600">⚽ AI Play Coach</h1>
        <p class="text-gray-500">กิจกรรมเพื่อจิณณ์พัฒนาการของลูกรัก</p>
    </header>

    <div id="activity-container" class="space-y-4 max-w-md mx-auto">
        <div id="loader" class="text-center py-10 text-gray-400">กำลังโหลดแผนกิจกรรมจาก AI...</div>
    </div>

    <script>
        // *** ตรวจสอบ URL นี้ให้ตรงกับที่ Deploy ใน GAS ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxuh6x_mcmqK9IH8OifrRUyT27lFT1KrOmDriXks5AMqIiHaNps1Vko6AFMCbEXm9gF/exec";

        async function loadActivities() {
            try {
                const response = await fetch(GAS_URL + "?action=getPlan");
                const data = await response.json();
                
                // ตรวจสอบว่ามีข้อมูลกิจกรรมส่งมาหรือไม่
                if (data.activities && data.activities.length > 0) {
                    render(data.activities);
                } else {
                    document.getElementById('activity-container').innerHTML = 
                        "<div class='text-center p-5 text-gray-400'>ยังไม่มีกิจกรรมในวันนี้ ลองกดรีเฟรชอีกครั้งครับ</div>";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('activity-container').innerHTML = 
                    "<div class='p-4 bg-red-50 text-red-500 rounded-xl text-center'>เชื่อมต่อฐานข้อมูลไม่ได้</div>";
            }
        }

        function render(activities) {
            const container = document.getElementById('activity-container');
            container.innerHTML = ''; // ล้าง Loader ออก
            activities.forEach(act => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-5 shadow-sm border-l-4 border-indigo-500";
                card.innerHTML = `
                    <span class="text-xs font-bold text-indigo-500">${act.time || 'ช่วงเวลา'}</span>
                    <h3 class="text-lg font-semibold text-gray-800">${act.title || 'ชื่อกิจกรรม'}</h3>
                    <p class="text-sm text-gray-600 mt-2">${act.steps || 'วิธีเล่น'}</p>
                    <div class="mt-3 text-[10px] bg-indigo-50 text-indigo-600 inline-block px-2 py-1 rounded-full">✨ ${act.focus || 'ด้านพัฒนาการ'}</div>
                `;
                container.appendChild(card);
            });
        }

        loadActivities();
    </script>
</body>
</html>
