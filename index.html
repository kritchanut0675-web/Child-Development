<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Play Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="p-4">
    <header class="mb-6 text-center">
        <h1 class="text-3xl font-bold text-indigo-600">⚽ AI Play Coach</h1>
        <p class="text-gray-500">กิจกรรมเพื่อพัฒนาการลูกรัก</p>
    </header>

    <div id="activity-container" class="space-y-4 max-w-md mx-auto">
        <div id="loader" class="text-center py-10 text-gray-400">
            <p>กำลังโหลดแผนกิจกรรมจาก AI...</p>
            <p class="text-xs mt-2 text-gray-300">(ครั้งแรกอาจใช้เวลา 5-10 วินาที)</p>
        </div>
    </div>

    <script>
        // *** ใส่ URL ที่ได้จากการ Deploy GAS ของคุณที่นี่ ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyavLHQp_6vNAMz0_D__XqIbqO0-Fb0vvpWMuDL-uRaKbQkX1-ZGyqYJ0gHa-uf5rhX/exec";

        async function loadActivities() {
            try {
                const response = await fetch(GAS_URL + "?action=getPlan", {
                    method: 'GET',
                    redirect: 'follow'
                });
                const data = await response.json();
                render(data.activities);
            } catch (e) {
                document.getElementById('activity-container').innerHTML = 
                    `<div class='p-4 bg-red-50 text-red-500 rounded-xl text-center'>
                        เชื่อมต่อฐานข้อมูลไม่ได้ <br> โปรดเช็คการ Deploy ใน GAS เป็น 'Anyone'
                     </div>`;
            }
        }

        function render(activities) {
            const container = document.getElementById('activity-container');
            container.innerHTML = '';
            activities.forEach(act => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl p-5 shadow-sm border-l-4 border-indigo-500 transition-all hover:shadow-md";
                card.innerHTML = `
                    <div class="flex justify-between">
                        <span class="text-xs font-bold text-indigo-400">${act.time}</span>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-800 mt-1">${act.title}</h3>
                    <p class="text-sm text-gray-600 mt-2"><strong>วิธีเล่น:</strong> ${act.steps}</p>
                    <div class="mt-3 flex gap-2">
                        <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded-full">✨ ${act.focus}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        loadActivities();
    </script>
</body>
</html>
