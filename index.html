<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Play Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdf6ee;
            --warm: #f5ede0;
            --coral: #e8735a;
            --teal: #3d9b8f;
            --teal-light: #5bbfb2;
            --teal-dark: #2a7a6f;
            --navy: #1e3a5f;
            --text: #2d2d2d;
            --text-soft: #7a7a7a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        body::before {
            content: ''; position: fixed; top: -120px; right: -120px;
            width: 420px; height: 420px;
            background: radial-gradient(circle, #f4c4a880 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; bottom: -100px; left: -100px;
            width: 360px; height: 360px;
            background: radial-gradient(circle, #5bbfb240 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
        }

        /* ── Bottom Nav ── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 1px solid #ede6dd;
            display: flex; z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
        }
        .nav-btn {
            flex: 1; padding: 10px 0 12px;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            background: none; border: none; cursor: pointer;
            font-family: 'Kanit', sans-serif; font-size: 11px;
            color: var(--text-soft); transition: all 0.2s;
        }
        .nav-btn .nav-icon { font-size: 22px; }
        .nav-btn.active { color: var(--teal); }
        .nav-btn.active .nav-icon { transform: scale(1.15); }

        /* ── Pages ── */
        .page { display: none; }
        .page.active { display: block; }

        /* ══ PAGE TODAY ══ */
        header {
            position: relative; z-index: 1;
            padding: 36px 24px 20px; text-align: center;
        }
        .header-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--teal); color: #fff;
            font-family: 'Kanit', sans-serif; font-size: 11px; font-weight: 500;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 100px; margin-bottom: 12px;
        }
        .header-title {
            font-family: 'Kanit', sans-serif; font-size: 34px; font-weight: 700;
            color: var(--navy); line-height: 1.1; margin-bottom: 6px;
        }
        .header-title span { color: var(--coral); }
        .header-sub { font-size: 14px; color: var(--text-soft); font-weight: 300; }

        .date-strip {
            position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: space-between;
            max-width: 420px; margin: 0 auto 20px; padding: 0 24px;
        }
        .date-text { font-family: 'Kanit', sans-serif; font-size: 13px; color: var(--text-soft); }
        .refresh-btn {
            display: flex; align-items: center; gap: 6px;
            background: var(--navy); color: #fff; border: none;
            padding: 8px 16px; border-radius: 100px;
            font-family: 'Kanit', sans-serif; font-size: 13px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .refresh-btn:hover { background: var(--coral); transform: scale(1.03); }
        .refresh-btn:active { transform: scale(0.97); }
        .refresh-btn.loading { opacity: 0.6; pointer-events: none; }

        .progress-wrap {
            position: relative; z-index: 1;
            max-width: 420px; margin: 0 auto 20px; padding: 0 24px;
        }
        .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
        .progress-track { height: 6px; background: #e0d8cf; border-radius: 100px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--teal-light)); border-radius: 100px; transition: width 0.6s ease; width: 0%; }

        .save-bar { position: relative; z-index: 1; max-width: 420px; margin: 0 auto 12px; padding: 0 24px; display: none; }
        .save-bar.visible { display: block; }
        .save-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: #fff; border: none; border-radius: 16px;
            font-family: 'Kanit', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(61,155,143,0.35); transition: all 0.2s;
        }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(61,155,143,0.4); }
        .save-btn:active { transform: scale(0.97); }
        .save-btn.saving { opacity: 0.7; pointer-events: none; }

        #activity-container {
            position: relative; z-index: 1;
            max-width: 420px; margin: 0 auto; padding: 0 24px 16px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .card {
            background: #fff; border-radius: 20px; padding: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            display: flex; gap: 16px; align-items: flex-start;
            transition: transform 0.2s, box-shadow 0.2s;
            opacity: 0; transform: translateY(20px); animation: fadeUp 0.4s ease forwards;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.10); }
        .card.done { opacity: 0.55; }
        .card.done .card-title { text-decoration: line-through; color: var(--text-soft); }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.12s}
        .card:nth-child(3){animation-delay:.19s}.card:nth-child(4){animation-delay:.26s}
        .card:nth-child(5){animation-delay:.33s}

        .time-dot {
            flex-shrink: 0; width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .time-morning   { background: #fff8e6; }
        .time-late      { background: #fef0eb; }
        .time-afternoon { background: #e8f7f5; }
        .time-evening   { background: #eef2ff; }
        .time-night     { background: #f3e8ff; }
        .time-default   { background: var(--warm); }

        .card-body { flex: 1; min-width: 0; }
        .card-time { font-size: 11px; font-weight: 500; color: var(--text-soft); margin-bottom: 4px; letter-spacing: 0.8px; }
        .card-title { font-family: 'Kanit', sans-serif; font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
        .card-steps { font-size: 13px; color: #666; line-height: 1.6; margin-bottom: 10px; }
        .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .focus-tag { font-size: 11px; font-weight: 500; background: var(--warm); color: var(--coral); padding: 3px 10px; border-radius: 100px; }
        .check-btn {
            flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid #e0d8cf; background: transparent;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 14px; color: transparent;
        }
        .check-btn:hover { border-color: var(--teal); background: #e8f7f5; }
        .check-btn.checked { background: var(--teal); border-color: var(--teal); color: #fff; }

        /* ══ PAGE DASHBOARD ══ */
        .dash-header {
            position: relative; z-index: 1;
            padding: 36px 24px 20px; text-align: center;
        }
        .dash-title { font-family: 'Kanit', sans-serif; font-size: 28px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
        .dash-title span { color: var(--teal); }
        .dash-sub { font-size: 13px; color: var(--text-soft); }

        .stat-row {
            position: relative; z-index: 1;
            max-width: 420px; margin: 0 auto 20px; padding: 0 24px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
        }
        .stat-card { background: #fff; border-radius: 16px; padding: 14px 10px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .stat-num { font-family: 'Kanit', sans-serif; font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
        .stat-num.teal { color: var(--teal); }
        .stat-num.coral { color: var(--coral); }
        .stat-label { font-size: 11px; color: var(--text-soft); margin-top: 4px; }

        .focus-section {
            position: relative; z-index: 1;
            max-width: 420px; margin: 0 auto 20px; padding: 0 24px;
        }
        .section-title { font-family: 'Kanit', sans-serif; font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 12px; }
        .focus-bars { display: flex; flex-direction: column; gap: 10px; }
        .focus-bar-row { display: flex; align-items: center; gap: 10px; }
        .focus-bar-label { font-size: 12px; color: var(--text); min-width: 110px; }
        .focus-bar-track { flex: 1; height: 8px; background: #ede6dd; border-radius: 100px; overflow: hidden; }
        .focus-bar-fill { height: 100%; border-radius: 100px; transition: width 0.8s ease; }
        .focus-bar-count { font-size: 12px; font-weight: 600; color: var(--text-soft); min-width: 20px; text-align: right; }

        .history-section {
            position: relative; z-index: 1;
            max-width: 420px; margin: 0 auto; padding: 0 24px 16px;
        }
        .history-filter {
            display: flex; gap: 8px; margin-bottom: 14px;
            overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
        }
        .history-filter::-webkit-scrollbar { display: none; }
        .filter-chip {
            flex-shrink: 0; padding: 5px 14px; border-radius: 100px;
            border: 1.5px solid #e0d8cf; background: #fff;
            font-family: 'Kanit', sans-serif; font-size: 12px; color: var(--text-soft);
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .filter-chip.active { background: var(--navy); border-color: var(--navy); color: #fff; }

        .history-group { margin-bottom: 20px; }
        .history-date {
            font-family: 'Kanit', sans-serif; font-size: 12px; font-weight: 600;
            color: var(--text-soft); letter-spacing: 1px;
            margin-bottom: 8px; padding: 0 2px;
        }
        .history-item {
            background: #fff; border-radius: 14px; padding: 12px 16px;
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.04);
            opacity: 0; transform: translateX(-10px); animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
        .history-icon { font-size: 20px; flex-shrink: 0; }
        .history-info { flex: 1; min-width: 0; }
        .history-title { font-family: 'Kanit', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); }
        .history-meta { font-size: 11px; color: var(--text-soft); margin-top: 2px; }
        .status-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 100px; flex-shrink: 0; }
        .status-done    { background: #e8f7f5; color: var(--teal-dark); }
        .status-pending { background: #fff3cd; color: #856404; }

        /* Shared */
        .loader { text-align: center; padding: 60px 20px; color: var(--text-soft); }
        .loader-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; }
        .loader-dots span { width: 10px; height: 10px; background: var(--teal-light); border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
        .loader-dots span:nth-child(2){animation-delay:.2s} .loader-dots span:nth-child(3){animation-delay:.4s}
        @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:.5} 40%{transform:scale(1.2);opacity:1} }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-soft); }
        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; line-height: 1.6; }
        .error-state { background: #fff5f5; border: 1px solid #fcd0cc; border-radius: 16px; padding: 20px; text-align: center; color: #c0392b; font-size: 14px; }

        .toast {
            position: fixed; bottom: 88px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--navy); color: #fff;
            font-family: 'Kanit', sans-serif; font-size: 14px;
            padding: 12px 22px; border-radius: 100px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.18);
            transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--teal-dark); }
        .toast.error   { background: #c0392b; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ══ PAGE: TODAY ══ -->
<div class="page active" id="page-today">
    <header>
        <div class="header-badge">🌱 Child Development</div>
        <h1 class="header-title">AI Play <span>Coach</span></h1>
        <p class="header-sub">กิจกรรมเพื่อพัฒนาการของจิณณ์ วันนี้</p>
    </header>

    <div class="date-strip">
        <span class="date-text" id="date-label">—</span>
        <button class="refresh-btn" id="refresh-btn" onclick="loadActivities()">
            <span id="refresh-icon">↻</span> สุ่มกิจกรรม
        </button>
    </div>

    <div class="progress-wrap">
        <div class="progress-label">
            <span>ความคืบหน้าวันนี้</span>
            <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="save-bar" id="save-bar">
        <button class="save-btn" id="save-btn" onclick="saveDoneActivities()">
            <span id="save-icon">💾</span>
            <span id="save-label">บันทึกกิจกรรมที่ทำเสร็จ</span>
        </button>
    </div>

    <div id="activity-container">
        <div class="loader">
            <div class="loader-dots"><span></span><span></span><span></span></div>
            <p>กำลังโหลดกิจกรรม...</p>
        </div>
    </div>
</div>

<!-- ══ PAGE: DASHBOARD ══ -->
<div class="page" id="page-dash">
    <div class="dash-header">
        <h1 class="dash-title">📊 <span>Dashboard</span></h1>
        <p class="dash-sub">ประวัติและสถิติกิจกรรมของจิณณ์</p>
    </div>

    <div class="stat-row">
        <div class="stat-card">
            <div class="stat-num" id="stat-total">—</div>
            <div class="stat-label">กิจกรรมทั้งหมด</div>
        </div>
        <div class="stat-card">
            <div class="stat-num teal" id="stat-done">—</div>
            <div class="stat-label">ทำแล้ว</div>
        </div>
        <div class="stat-card">
            <div class="stat-num coral" id="stat-days">—</div>
            <div class="stat-label">วันที่บันทึก</div>
        </div>
    </div>

    <div class="focus-section">
        <div class="section-title">🎯 ด้านพัฒนาการที่ฝึก</div>
        <div class="focus-bars" id="focus-bars">
            <div style="font-size:13px;color:var(--text-soft)">กำลังโหลด...</div>
        </div>
    </div>

    <div class="history-section">
        <div class="section-title">📋 ประวัติกิจกรรม</div>
        <div class="history-filter">
            <button class="filter-chip active" onclick="filterHistory('all',this)">ทั้งหมด</button>
            <button class="filter-chip" onclick="filterHistory('done',this)">✅ ทำแล้ว</button>
            <button class="filter-chip" onclick="filterHistory('pending',this)">⏳ ยังไม่ทำ</button>
        </div>
        <div id="history-container">
            <div class="loader">
                <div class="loader-dots"><span></span><span></span><span></span></div>
                <p>กำลังโหลดประวัติ...</p>
            </div>
        </div>
    </div>
</div>

<!-- ══ Bottom Nav ══ -->
<nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchPage('today')">
        <span class="nav-icon">🏠</span>วันนี้
    </button>
    <button class="nav-btn" id="nav-dash" onclick="switchPage('dash')">
        <span class="nav-icon">📊</span>Dashboard
    </button>
</nav>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxuh6x_mcmqK9IH8OifrRUyT27lFT1KrOmDriXks5AMqIiHaNps1Vko6AFMCbEXm9gF/exec";

// Init date
const now = new Date();
document.getElementById('date-label').textContent = now.toLocaleDateString('th-TH', {
    weekday: 'long', day: 'numeric', month: 'long'
});

// State
let activities    = [];
let allHistory    = [];
let currentFilter = 'all';
let doneSet  = new Set(JSON.parse(localStorage.getItem('doneActivities')  || '[]'));
let savedSet = new Set(JSON.parse(localStorage.getItem('savedActivities') || '[]'));

const FOCUS_COLORS = ['#3d9b8f','#e8735a','#5c6bc0','#e8c547','#9c27b0','#2196f3','#ff7043','#66bb6a'];

// ── Switch page
function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    document.getElementById('nav-'  + page).classList.add('active');
    if (page === 'dash') loadHistory();
}

// ── Helpers
function getTimeInfo(time) {
    if (!time) return { cls: 'time-default', icon: '🎯' };
    if (time.includes('เช้า'))  return { cls: 'time-morning',   icon: '☀️' };
    if (time.includes('สาย'))   return { cls: 'time-late',      icon: '🌤️' };
    if (time.includes('บ่าย'))  return { cls: 'time-afternoon', icon: '🌿' };
    if (time.includes('เย็น'))  return { cls: 'time-evening',   icon: '🌆' };
    if (time.includes('ค่ำ') || time.includes('กลางคืน')) return { cls: 'time-night', icon: '🌙' };
    return { cls: 'time-default', icon: '🎯' };
}

function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => { t.className = 'toast'; }, 3000);
}

function formatDateTH(str) {
    try {
        const d = new Date(str);
        if (isNaN(d)) return str;
        return d.toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    } catch { return str; }
}

// ── Progress
function updateProgress() {
    const total   = activities.length;
    const done    = activities.filter((_, i) => doneSet.has(i)).length;
    const unsaved = [...doneSet].filter(i => !savedSet.has(i));

    document.getElementById('progress-text').textContent = `${done} / ${total}`;
    document.getElementById('progress-fill').style.width = total ? `${(done/total)*100}%` : '0%';
    document.getElementById('save-bar').className = unsaved.length > 0 ? 'save-bar visible' : 'save-bar';
    document.getElementById('save-label').textContent = `บันทึกกิจกรรมที่ทำเสร็จ (${unsaved.length} รายการ)`;
}

// ── Toggle done
function toggleDone(index) {
    if (doneSet.has(index)) doneSet.delete(index);
    else doneSet.add(index);
    localStorage.setItem('doneActivities', JSON.stringify([...doneSet]));

    const card = document.querySelector(`[data-index="${index}"]`);
    const btn  = card.querySelector('.check-btn');
    card.classList.toggle('done', doneSet.has(index));
    btn.classList.toggle('checked', doneSet.has(index));
    btn.textContent = doneSet.has(index) ? '✓' : '';
    updateProgress();
}

// ── Save to Sheet
async function saveDoneActivities() {
    const unsaved = [...doneSet].filter(i => !savedSet.has(i));
    if (!unsaved.length) { showToast('ไม่มีกิจกรรมใหม่ที่ต้องบันทึก'); return; }

    const saveBtn = document.getElementById('save-btn');
    document.getElementById('save-icon').textContent = '⏳';
    saveBtn.classList.add('saving');

    let ok = 0, fail = 0;
    for (const i of unsaved) {
        const act = activities[i];
        if (!act) continue;
        try {
            const res  = await fetch(GAS_URL + '?' + new URLSearchParams({ action: 'updateStatus', row: i + 2, status: 'done' }));
            const data = await res.json();
            if (data.success) {
                savedSet.add(i); ok++;
                const card = document.querySelector(`[data-index="${i}"]`);
                if (card && !card.querySelector('.saved-badge')) {
                    const b = document.createElement('span');
                    b.className = 'saved-badge';
                    b.textContent = '✅ บันทึกแล้ว';
                    b.style.cssText = 'font-size:10px;color:var(--teal-dark);background:#e8f7f5;padding:2px 8px;border-radius:100px;';
                    card.querySelector('.focus-tag').after(b);
                }
            } else fail++;
        } catch { fail++; }
    }

    localStorage.setItem('savedActivities', JSON.stringify([...savedSet]));
    document.getElementById('save-icon').textContent = '💾';
    saveBtn.classList.remove('saving');
    showToast(fail === 0 ? `✅ บันทึกสำเร็จ ${ok} กิจกรรม` : `⚠️ สำเร็จ ${ok} / ล้มเหลว ${fail}`, fail === 0 ? 'success' : 'error');
    updateProgress();
}

// ── Render today cards
function render(list) {
    activities = list;
    const container = document.getElementById('activity-container');
    container.innerHTML = '';

    if (!list || list.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="emoji">🪀</div><p>ยังไม่มีกิจกรรมในวันนี้<br>ลองกด <strong>สุ่มกิจกรรม</strong></p></div>`;
        updateProgress(); return;
    }

    list.forEach((act, i) => {
        const ti = getTimeInfo(act.time);
        const card = document.createElement('div');
        card.className = 'card' + (doneSet.has(i) ? ' done' : '');
        card.dataset.index = i;
        card.innerHTML = `
            <div class="time-dot ${ti.cls}">${ti.icon}</div>
            <div class="card-body">
                <div class="card-time">${act.time || 'ช่วงเวลา'}</div>
                <div class="card-title">${act.title || 'ชื่อกิจกรรม'}</div>
                <div class="card-steps">${act.steps || 'วิธีเล่น'}</div>
                <div class="card-footer">
                    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                        <span class="focus-tag">✨ ${act.focus || 'พัฒนาการ'}</span>
                        ${savedSet.has(i) ? '<span class="saved-badge" style="font-size:10px;color:var(--teal-dark);background:#e8f7f5;padding:2px 8px;border-radius:100px;">✅ บันทึกแล้ว</span>' : ''}
                    </div>
                    <button class="check-btn ${doneSet.has(i) ? 'checked' : ''}" onclick="toggleDone(${i})">${doneSet.has(i) ? '✓' : ''}</button>
                </div>
            </div>`;
        container.appendChild(card);
    });
    updateProgress();
}

// ── Load today
async function loadActivities() {
    const btn  = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    btn.classList.add('loading');
    icon.style.animation = 'spin 0.8s linear infinite';
    document.getElementById('activity-container').innerHTML = `<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div><p>กำลังโหลดกิจกรรม...</p></div>`;

    try {
        const res  = await fetch(GAS_URL + '?action=getPlan');
        const data = await res.json();
        doneSet.clear(); savedSet.clear();
        localStorage.setItem('doneActivities', '[]');
        localStorage.setItem('savedActivities', '[]');
        render(data.activities || []);
    } catch {
        document.getElementById('activity-container').innerHTML =
            `<div class="error-state">⚠️ เชื่อมต่อฐานข้อมูลไม่ได้<br><small>กรุณาตรวจสอบการเชื่อมต่อ</small></div>`;
    } finally {
        btn.classList.remove('loading');
        icon.style.animation = '';
    }
}

// ══ DASHBOARD ══

async function loadHistory() {
    document.getElementById('history-container').innerHTML =
        `<div class="loader"><div class="loader-dots"><span></span><span></span><span></span></div><p>กำลังโหลดประวัติ...</p></div>`;
    try {
        const res  = await fetch(GAS_URL + '?action=getPlan');
        const data = await res.json();
        allHistory = data.activities || [];
        renderStats(allHistory);
        renderFocusBars(allHistory);
        renderHistory(allHistory, currentFilter);
    } catch {
        document.getElementById('history-container').innerHTML =
            `<div class="error-state">⚠️ โหลดประวัติไม่ได้</div>`;
    }
}

function renderStats(list) {
    document.getElementById('stat-total').textContent = list.length;
    document.getElementById('stat-done').textContent  = list.filter(a => a.status === 'done').length;
    document.getElementById('stat-days').textContent  = new Set(list.map(a => a.date)).size || 0;
}

function renderFocusBars(list) {
    const counts = {};
    list.forEach(a => { const f = a.focus || 'อื่นๆ'; counts[f] = (counts[f] || 0) + 1; });
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    const max = sorted[0]?.[1] || 1;
    const el  = document.getElementById('focus-bars');

    if (!sorted.length) { el.innerHTML = '<div style="font-size:13px;color:var(--text-soft)">ยังไม่มีข้อมูล</div>'; return; }

    el.innerHTML = sorted.map(([label, count], idx) => `
        <div class="focus-bar-row">
            <div class="focus-bar-label">${label}</div>
            <div class="focus-bar-track">
                <div class="focus-bar-fill" style="width:${(count/max)*100}%;background:${FOCUS_COLORS[idx % FOCUS_COLORS.length]}"></div>
            </div>
            <div class="focus-bar-count">${count}</div>
        </div>`).join('');
}

function filterHistory(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderHistory(allHistory, filter);
}

function renderHistory(list, filter) {
    const filtered = filter === 'all' ? list : list.filter(a => a.status === filter);
    const container = document.getElementById('history-container');

    if (!filtered.length) {
        container.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>ไม่มีข้อมูลในหมวดนี้</p></div>`;
        return;
    }

    // Group by date (newest first)
    const groups = {};
    filtered.forEach(a => { const d = a.date || 'ไม่ระบุวันที่'; if (!groups[d]) groups[d] = []; groups[d].push(a); });
    const sortedDates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));

    container.innerHTML = sortedDates.map(date => {
        const items = groups[date];
        return `
            <div class="history-group">
                <div class="history-date">${formatDateTH(date)}</div>
                ${items.map((act, idx) => {
                    const ti = getTimeInfo(act.time);
                    const isDone = act.status === 'done';
                    return `
                        <div class="history-item" style="animation-delay:${idx * 0.06}s">
                            <div class="history-icon">${ti.icon}</div>
                            <div class="history-info">
                                <div class="history-title">${act.title || 'ชื่อกิจกรรม'}</div>
                                <div class="history-meta">${act.time || ''} · ${act.focus || 'พัฒนาการ'}</div>
                            </div>
                            <span class="status-badge ${isDone ? 'status-done' : 'status-pending'}">
                                ${isDone ? '✅ ทำแล้ว' : '⏳ ยังไม่ทำ'}
                            </span>
                        </div>`;
                }).join('')}
            </div>`;
    }).join('');
}

// Start
loadActivities();
</script>
