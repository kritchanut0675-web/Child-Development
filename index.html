<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Play Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdf6ee;
            --warm: #f5ede0;
            --peach: #f4a882;
            --coral: #e8735a;
            --teal: #3d9b8f;
            --teal-light: #5bbfb2;
            --teal-dark: #2a7a6f;
            --navy: #1e3a5f;
            --gold: #e8c547;
            --text: #2d2d2d;
            --text-soft: #7a7a7a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background blobs ── */
        body::before {
            content: '';
            position: fixed;
            top: -120px; right: -120px;
            width: 420px; height: 420px;
            background: radial-gradient(circle, #f4c4a880 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; left: -100px;
            width: 360px; height: 360px;
            background: radial-gradient(circle, #5bbfb240 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        header {
            position: relative;
            z-index: 1;
            padding: 40px 24px 28px;
            text-align: center;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--teal);
            color: #fff;
            font-family: 'Kanit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 14px;
        }

        .header-title {
            font-family: 'Kanit', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--navy);
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .header-title span {
            color: var(--coral);
        }

        .header-sub {
            font-size: 14px;
            color: var(--text-soft);
            font-weight: 300;
        }

        /* ── Date strip ── */
        .date-strip {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 420px;
            margin: 0 auto 24px;
            padding: 0 24px;
        }

        .date-text {
            font-family: 'Kanit', sans-serif;
            font-size: 13px;
            color: var(--text-soft);
            font-weight: 400;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--navy);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 100px;
            font-family: 'Kanit', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .refresh-btn:hover { background: var(--coral); transform: scale(1.03); }
        .refresh-btn:active { transform: scale(0.97); }
        .refresh-btn.loading { opacity: 0.6; pointer-events: none; }

        /* ── Progress bar ── */
        .progress-wrap {
            position: relative;
            z-index: 1;
            max-width: 420px;
            margin: 0 auto 28px;
            padding: 0 24px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-soft);
            margin-bottom: 6px;
        }

        .progress-track {
            height: 6px;
            background: #e0d8cf;
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--teal), var(--teal-light));
            border-radius: 100px;
            transition: width 0.6s ease;
            width: 0%;
        }

        /* ── Cards ── */
        #activity-container {
            position: relative;
            z-index: 1;
            max-width: 420px;
            margin: 0 auto;
            padding: 0 24px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
            display: flex;
            gap: 16px;
            align-items: flex-start;
            transition: transform 0.2s, box-shadow 0.2s;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.4s ease forwards;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.10);
        }

        .card.done {
            opacity: 0.55;
        }

        .card.done .card-title {
            text-decoration: line-through;
            color: var(--text-soft);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* stagger */
        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.12s; }
        .card:nth-child(3) { animation-delay: 0.19s; }
        .card:nth-child(4) { animation-delay: 0.26s; }
        .card:nth-child(5) { animation-delay: 0.33s; }

        /* Time dot */
        .time-dot {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Kanit', sans-serif;
            font-size: 10px;
            font-weight: 600;
            gap: 2px;
        }

        .time-dot .dot-icon { font-size: 18px; }

        .time-morning   { background: #fff8e6; color: #c47f00; }
        .time-late      { background: #fef0eb; color: var(--coral); }
        .time-afternoon { background: #e8f7f5; color: var(--teal-dark); }
        .time-evening   { background: #eef2ff; color: #5c6bc0; }
        .time-night     { background: #f3e8ff; color: #9c27b0; }
        .time-default   { background: var(--warm); color: var(--text-soft); }

        .card-body { flex: 1; min-width: 0; }

        .card-time {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-soft);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .card-title {
            font-family: 'Kanit', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .card-steps {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .focus-tag {
            font-size: 11px;
            font-weight: 500;
            background: var(--warm);
            color: var(--coral);
            padding: 3px 10px;
            border-radius: 100px;
        }

        .check-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #e0d8cf;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 14px;
            color: transparent;
            flex-shrink: 0;
        }

        .check-btn:hover {
            border-color: var(--teal);
            background: #e8f7f5;
        }

        .check-btn.checked {
            background: var(--teal);
            border-color: var(--teal);
            color: #fff;
        }

        /* ── Loader ── */
        .loader {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-soft);
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 14px;
        }

        .loader-dots span {
            width: 10px; height: 10px;
            background: var(--teal-light);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        /* ── Empty / Error ── */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-soft);
        }
        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; line-height: 1.6; }

        .error-state {
            background: #fff5f5;
            border: 1px solid #fcd0cc;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            color: #c0392b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-badge">🌱 Child Development</div>
        <h1 class="header-title">AI Play <span>Coach</span></h1>
        <p class="header-sub">กิจกรรมเพื่อพัฒนาการของจิณณ์ วันนี้</p>
    </header>

    <div class="date-strip">
        <span class="date-text" id="date-label">—</span>
        <button class="refresh-btn" id="refresh-btn" onclick="loadActivities()">
            <span id="refresh-icon">↻</span> สุ่มกิจกรรม
        </button>
    </div>

    <div class="progress-wrap">
        <div class="progress-label">
            <span>ความคืบหน้าวันนี้</span>
            <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="activity-container">
        <div class="loader">
            <div class="loader-dots">
                <span></span><span></span><span></span>
            </div>
            <p>กำลังโหลดกิจกรรม...</p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxuh6x_mcmqK9IH8OifrRUyT27lFT1KrOmDriXks5AMqIiHaNps1Vko6AFMCbEXm9gF/exec";

        // วันที่ภาษาไทย
        const now = new Date();
        document.getElementById('date-label').textContent = now.toLocaleDateString('th-TH', {
            weekday: 'long', day: 'numeric', month: 'long'
        });

        let activities = [];
        let doneSet = new Set(JSON.parse(localStorage.getItem('doneActivities') || '[]'));

        function getTimeStyle(time) {
            if (!time) return { cls: 'time-default', icon: '🎯' };
            if (time.includes('เช้า'))   return { cls: 'time-morning',   icon: '☀️' };
            if (time.includes('สาย'))    return { cls: 'time-late',      icon: '🌤️' };
            if (time.includes('บ่าย'))   return { cls: 'time-afternoon', icon: '🌿' };
            if (time.includes('เย็น'))   return { cls: 'time-evening',   icon: '🌆' };
            if (time.includes('ค่ำ') || time.includes('กลางคืน')) return { cls: 'time-night', icon: '🌙' };
            return { cls: 'time-default', icon: '🎯' };
        }

        function updateProgress() {
            const total = activities.length;
            const done = activities.filter((_, i) => doneSet.has(i)).length;
            document.getElementById('progress-text').textContent = `${done} / ${total}`;
            document.getElementById('progress-fill').style.width = total ? `${(done/total)*100}%` : '0%';
        }

        function toggleDone(index) {
            if (doneSet.has(index)) doneSet.delete(index);
            else doneSet.add(index);
            localStorage.setItem('doneActivities', JSON.stringify([...doneSet]));

            const card = document.querySelector(`[data-index="${index}"]`);
            const btn  = card.querySelector('.check-btn');
            if (doneSet.has(index)) {
                card.classList.add('done');
                btn.classList.add('checked');
                btn.textContent = '✓';
            } else {
                card.classList.remove('done');
                btn.classList.remove('checked');
                btn.textContent = '';
            }
            updateProgress();
        }

        function render(list) {
            activities = list;
            const container = document.getElementById('activity-container');
            container.innerHTML = '';

            if (!list || list.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🪀</div>
                        <p>ยังไม่มีกิจกรรมในวันนี้<br>ลองกด <strong>สุ่มกิจกรรม</strong> ด้านบนครับ</p>
                    </div>`;
                return;
            }

            list.forEach((act, i) => {
                const ts = getTimeStyle(act.time);
                const isDone = doneSet.has(i);
                const card = document.createElement('div');
                card.className = 'card' + (isDone ? ' done' : '');
                card.dataset.index = i;
                card.innerHTML = `
                    <div class="time-dot ${ts.cls}">
                        <span class="dot-icon">${ts.icon}</span>
                    </div>
                    <div class="card-body">
                        <div class="card-time">${act.time || 'ช่วงเวลา'}</div>
                        <div class="card-title">${act.title || 'ชื่อกิจกรรม'}</div>
                        <div class="card-steps">${act.steps || 'วิธีเล่น'}</div>
                        <div class="card-footer">
                            <span class="focus-tag">✨ ${act.focus || 'พัฒนาการ'}</span>
                            <button class="check-btn ${isDone ? 'checked' : ''}" onclick="toggleDone(${i})">
                                ${isDone ? '✓' : ''}
                            </button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });

            updateProgress();
        }

        async function loadActivities() {
            const btn  = document.getElementById('refresh-btn');
            const icon = document.getElementById('refresh-icon');
            btn.classList.add('loading');
            icon.style.display = 'inline-block';
            icon.style.animation = 'spin 0.8s linear infinite';

            document.getElementById('activity-container').innerHTML = `
                <div class="loader">
                    <div class="loader-dots"><span></span><span></span><span></span></div>
                    <p>กำลังโหลดกิจกรรม...</p>
                </div>`;

            try {
                const res  = await fetch(GAS_URL + "?action=getPlan");
                const data = await res.json();
                doneSet.clear();
                localStorage.setItem('doneActivities', '[]');
                render(data.activities || []);
            } catch (err) {
                console.error(err);
                document.getElementById('activity-container').innerHTML = `
                    <div class="error-state">⚠️ เชื่อมต่อฐานข้อมูลไม่ได้<br><small>กรุณาตรวจสอบการเชื่อมต่อ</small></div>`;
            } finally {
                btn.classList.remove('loading');
                icon.style.animation = '';
            }
        }

        // CSS spin
        const style = document.createElement('style');
        style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
        document.head.appendChild(style);

        loadActivities();
    </script>
</body>
</html>
